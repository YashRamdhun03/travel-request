
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Request</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f1;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
 
    .wrap {
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
 
    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b6b65;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding-bottom: .75rem;
      border-bottom: 1px solid #ddddd8;
    }
 
    .card {
      background: #ffffff;
      border: 1px solid #e2e2de;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
 
    .card h2 {
      font-size: 12px;
      font-weight: 600;
      color: #8a8a85;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 1rem;
    }
 
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1rem;
    }
 
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
 
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: #6b6b65;
    }
 
    input[type="date"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafaf8;
      border: 1px solid #ddddd8;
      border-radius: 8px;
      outline: none;
      transition: border-color .15s;
    }
 
    input[type="date"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-color: #888;
      background: #fff;
    }
 
    textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.5;
    }
 
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 0;
      border-top: 1px solid #eeeeed;
      border-bottom: 1px solid #eeeeed;
      margin-bottom: 1rem;
    }
 
    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #1a1a1a;
      cursor: pointer;
    }
 
    .options input[type="radio"],
    .options input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1a1a1a;
      cursor: pointer;
    }
 
    .result {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #f4f4f1;
      border-radius: 8px;
    }
 
    .result-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
 
    #status {
      font-size: 12px;
      color: #8a8a85;
    }
 
    #days {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }
 
    .actions {
      display: flex;
      gap: 8px;
    }
 
    .actions button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #ddddd8;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
    }
 
    .actions button:hover { background: #f0f0ec; }
    .actions button:active { transform: scale(.98); }
 
    .opt-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
 
    .opt-fields .row { margin-bottom: 0; }
 
    pre#preview {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f4f4f1;
      padding: 12px 14px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
 
    .submit-btn {
      width: 100%;
      padding: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      background: #1a1a1a;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
 
    .submit-btn:hover { opacity: .85; }
    .submit-btn:active { transform: scale(.99); }
 
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .result { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
 
    <div class="page-title">Travel request</div>
 
    <!-- Trip Details -->
    <div class="card">
      <h2>Trip details</h2>
      <div class="row">
        <div class="field">
          <label for="departure">Departure date</label>
          <input type="date" id="departure">
        </div>
        <div class="field">
          <label for="return">Return date</label>
          <input type="date" id="return">
        </div>
      </div>
      <div class="options">
        <label><input type="radio" name="mode" value="calendar" checked> Calendar days</label>
        <label><input type="radio" name="mode" value="working"> Working days (Mon–Fri)</label>
        <label><input type="checkbox" id="holidays"> Exclude company holidays</label>
      </div>
      <div class="result">
        <div class="result-left">
          <span id="status">Select dates to calculate</span>
          <strong id="days">— days</strong>
        </div>
        <div class="actions">
          <button id="clear">Clear</button>
          <button id="copy">Copy summary</button>
        </div>
      </div>
    </div>
 
    <!-- Optional Information -->
    <div class="card">
      <h2>Optional information</h2>
      <div class="opt-fields">
        <div class="row">
          <div class="field">
            <label for="country">Country</label>
            <input type="text" id="country" placeholder="e.g. France">
          </div>
          <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="e.g. Paris">
          </div>
        </div>
        <div class="field">
          <label for="purpose">Purpose</label>
          <input type="text" id="purpose" placeholder="e.g. Client meeting">
        </div>
        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Any additional notes…"></textarea>
        </div>
      </div>
    </div>
 
    <!-- Preview -->
    <div class="card">
      <h2>Preview</h2>
      <pre id="preview">Departure: —
Return:    —
Duration:  —
Purpose:   —</pre>
    </div>
 
    <button class="submit-btn" id="submit">Submit request</button>
 
  </div>
 
  <script>
    const dep = document.getElementById('departure');
    const ret = document.getElementById('return');
    const status = document.getElementById('status');
    const days = document.getElementById('days');
    const preview = document.getElementById('preview');
    const country = document.getElementById('country');
    const city = document.getElementById('city');
    const purpose = document.getElementById('purpose');
 
    function calcDays() {
      const d = dep.value, r = ret.value;
      if (!d || !r) return null;
      const start = new Date(d), end = new Date(r);
      if (end < start) return null;
      const mode = document.querySelector('input[name=mode]:checked').value;
      if (mode === 'calendar') {
        return Math.round((end - start) / 864e5) + 1;
      } else {
        let count = 0, cur = new Date(start);
        while (cur <= end) {
          const day = cur.getDay();
          if (day !== 0 && day !== 6) count++;
          cur.setDate(cur.getDate() + 1);
        }
        return count;
      }
    }
 
    function fmt(v) {
      return v ? new Date(v).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
    }
 
    function update() {
      const n = calcDays();
      if (n === null) {
        status.textContent = 'Select dates to calculate';
        days.textContent = '— days';
      } else {
        const mode = document.querySelector('input[name=mode]:checked').value;
        status.textContent = mode === 'calendar' ? 'Calendar days' : 'Working days (Mon–Fri)';
        days.textContent = n + ' day' + (n === 1 ? '' : 's');
      }
      const dest = [city.value, country.value].filter(Boolean).join(', ');
      preview.textContent =
        'Departure: ' + fmt(dep.value) + '\n' +
        'Return:    ' + fmt(ret.value) + '\n' +
        'Duration:  ' + (n !== null ? n + ' day' + (n === 1 ? '' : 's') : '—') + '\n' +
        'Purpose:   ' + (purpose.value || '—') +
        (dest ? '\nDestination: ' + dest : '');
    }
 
    [dep, ret, ...document.querySelectorAll('input[name=mode]'),
      document.getElementById('holidays'), country, city, purpose,
      document.getElementById('notes')
    ].forEach(el => el.addEventListener('change', update));
 
    [purpose, country, city].forEach(el => el.addEventListener('input', update));
 
    document.getElementById('clear').addEventListener('click', () => {
      dep.value = ''; ret.value = '';
      document.querySelector('input[name=mode][value=calendar]').checked = true;
      document.getElementById('holidays').checked = false;
      ['country', 'city', 'purpose', 'notes'].forEach(id => document.getElementById(id).value = '');
      update();
    });
 
    document.getElementById('copy').addEventListener('click', () => {
      navigator.clipboard.writeText(preview.textContent).catch(() => {});
      const btn = document.getElementById('copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy summary', 1500);
    });
 
    document.getElementById('submit').addEventListener('click', () => {
      if (!dep.value || !ret.value) {
        status.textContent = 'Please fill in both dates first';
        return;
      }
      alert('Request submitted!\n\n' + preview.textContent);
    });
  </script>
</body>
</html>
