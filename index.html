<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Travel Request – Date & Days Calculator</title>
  <style>
    :root{
      --brand:#004e98; --brand-2:#2a7fba; --bg:#f6f8fb; --card:#ffffff; --text:#1a1a1a; --muted:#6b7280; --ok:#0a7d32; --err:#b3261e;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text)}
    header{background:linear-gradient(90deg,var(--brand),var(--brand-2)); color:#fff; padding:24px}
    header h1{margin:0; font-size:1.25rem}
    main{max-width:900px; margin:24px auto; padding:0 16px}
    .card{background:var(--card); border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,.06); padding:20px; margin-bottom:16px}
    .grid{display:grid; gap:16px}
    @media(min-width:720px){ .grid-2{grid-template-columns:1fr 1fr} .grid-3{grid-template-columns:repeat(3,1fr)} }
    label{display:block; font-weight:600; margin-bottom:6px}
    input[type="text"], input[type="date"], select, textarea{
      width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; background:#fff; color:inherit
    }
    textarea{min-height:80px; resize:vertical}
    .hint{font-size:.85rem; color:var(--muted); margin-top:4px}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .toggle-group{display:flex; gap:8px; align-items:center}
    .pill{display:inline-flex; align-items:center; gap:8px; border:1px solid #d1d5db; border-radius:999px; padding:8px 12px; background:#fff}
    .result{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border:1px solid #e5e7eb; background:#f9fafb; border-radius:10px}
    .result strong{font-size:1.25rem}
    .btn{appearance:none; border:0; background:var(--brand); color:#fff; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:600}
    .btn:disabled{opacity:.6; cursor:not-allowed}
    .btn.secondary{background:#111827; color:#fff}
    .btn.ghost{background:#fff; color:#111827; border:1px solid #d1d5db}
    .status{font-size:.92rem}
    .ok{color:var(--ok)}
    .err{color:var(--err)}
    .sr-only{position:absolute !important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0}
  </style>
</head>
<body>
<header>
  <h1>Travel Request – Date & Days Calculator</h1>
</header>

<main>
  <section class="card" aria-labelledby="trip-details-h">
    <h2 id="trip-details-h" style="margin-top:0">Trip details</h2>
    <div class="grid grid-2">
      <div>
        <label for="depart">Departure date</label>
        <input type="date" id="depart" required />
        <p class="hint">Select the first day you are away.</p>
      </div>
      <div>
        <label for="return">Return date</label>
        <input type="date" id="return" required />
        <p class="hint">Select the last day you are away.</p>
      </div>
    </div>

    <div style="margin-top:10px" class="row" role="group" aria-labelledby="calc-mode-h">
      <span id="calc-mode-h" class="sr-only">Calculation mode</span>
      <div class="pill">
        <input type="radio" id="modeCalendar" name="mode" value="calendar" checked />
        <label for="modeCalendar" style="margin:0;font-weight:500">Calendar days (incl. weekends)</label>
      </div>
      <div class="pill">
        <input type="radio" id="modeWork" name="mode" value="workdays" />
        <label for="modeWork" style="margin:0;font-weight:500">Working days (Mon–Fri)</label>
      </div>
      <div class="pill" id="holidaysPill" style="display:none">
        <input type="checkbox" id="excludeHolidays" />
        <label for="excludeHolidays" style="margin:0;font-weight:500">Exclude company holidays</label>
      </div>
    </div>

    <div class="result" style="margin-top:14px">
      <div>
        <div class="status" id="statusMsg" aria-live="polite"></div>
        <div><strong id="daysValue">0</strong> <span id="daysLabel">days</span></div>
      </div>
      <div class="row">
        <button class="btn ghost" id="btnClear" type="button">Clear</button>
        <button class="btn" id="btnCopy" type="button" disabled>Copy summary</button>
      </div>
    </div>
    <p class="hint" style="margin-top:8px">Inclusive count: if departure and return are the same, that counts as <em>1</em> day.</p>
  </section>

  <section class="card" aria-labelledby="optional-info-h">
    <h2 id="optional-info-h" style="margin-top:0">Optional information</h2>
    <div class="grid grid-3">
      <div>
        <label for="country">Destination country</label>
        <input id="country" type="text" placeholder="e.g., Morocco" />
      </div>
      <div>
        <label for="city">Destination city</label>
        <input id="city" type="text" placeholder="e.g., Casablanca" />
      </div>
      <div>
        <label for="purpose">Purpose</label>
        <input id="purpose" type="text" placeholder="e.g., Client visit" />
      </div>
    </div>
    <div style="margin-top:12px">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Additional context, itinerary references, etc."></textarea>
    </div>
  </section>

  <section class="card" aria-labelledby="preview-h">
    <h2 id="preview-h" style="margin-top:0">Preview</h2>
    <pre id="preview" style="white-space:pre-wrap; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#fcfcfd; border:1px solid #e5e7eb; padding:12px; border-radius:10px; min-height:80px;">
Select dates to generate a summary…
    </pre>
  </section>
</main>

<script>
  // ======= Configuration =======
  // Company holidays (YYYY-MM-DD). Add or edit as needed.
  const HOLIDAYS = [
    // "2026-01-01", // New Year's Day
    // "2026-03-12", // Example: Independence Day
    // "2026-12-25"  // Christmas
  ];
  // ===== End configuration =====

  const elDepart = document.getElementById('depart');
  const elReturn = document.getElementById('return');
  const elModeCalendar = document.getElementById('modeCalendar');
  const elModeWork = document.getElementById('modeWork');
  const elExcludeHolidays = document.getElementById('excludeHolidays');
  const holidaysPill = document.getElementById('holidaysPill');
  const elStatus = document.getElementById('statusMsg');
  const elDaysValue = document.getElementById('daysValue');
  const elDaysLabel = document.getElementById('daysLabel');
  const elBtnClear = document.getElementById('btnClear');
  const elBtnCopy = document.getElementById('btnCopy');
  const elPreview = document.getElementById('preview');

  // Helpers
  const fmt = (d) => d ? new Date(d).toISOString().slice(0,10) : '';
  const parse = (s) => s ? new Date(s + 'T00:00:00') : null;
  const isWeekend = (d) => [0,6].includes(d.getDay()); // Sun=0, Sat=6
  const isHoliday = (d) => HOLIDAYS.includes(fmt(d));

  function inclusiveCalendarDays(start, end){
    const diff = Math.floor((end - start)/(1000*60*60*24));
    return diff + 1;
  }

  function workingDays(start, end, excludeHolidays=false){
    let count = 0;
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const dow = d.getDay();
      if (dow >= 1 && dow <= 5){ // Mon–Fri
        if (excludeHolidays && isHoliday(d)) continue;
        count++;
      }
    }
    return count;
  }

  function validateDates(start, end){
    if (!start || !end){
      return { ok:false, msg:"Select both departure and return dates." };
    }
    if (end < start){
      return { ok:false, msg:"Return date cannot be before departure." };
    }
    return { ok:true, msg:"" };
  }

  function updateHolidaysVisibility(){
    holidaysPill.style.display = elModeWork.checked ? 'inline-flex' : 'none';
  }

  function compute(){
    const start = parse(elDepart.value);
    const end = parse(elReturn.value);

    const val = validateDates(start, end);
    if (!val.ok){
      elStatus.textContent = val.msg;
      elStatus.className = "status err";
      elDaysValue.textContent = '0';
      elDaysLabel.textContent = 'days';
      elBtnCopy.disabled = true;
      updatePreview();
      return;
    }
    elStatus.textContent = "Dates look good.";
    elStatus.className = "status ok";

    let days = 0;
    let modeLabel = '';
    if (elModeCalendar.checked){
      days = inclusiveCalendarDays(start, end);
      modeLabel = "calendar days";
    } else {
      days = workingDays(start, end, elExcludeHolidays.checked);
      modeLabel = `working days${elExcludeHolidays.checked ? " (holidays excluded)" : ""}`;
    }

    elDaysValue.textContent = String(days);
    elDaysLabel.textContent = days === 1 ? 'day' : 'days';
    elBtnCopy.disabled = false;
    updatePreview(modeLabel, days, start, end);
  }

  function updatePreview(modeLabel = '', days = 0, start = null, end = null){
    const destCountry = document.getElementById('country').value.trim();
    const destCity = document.getElementById('city').value.trim();
    const purpose = document.getElementById('purpose').value.trim();
    const notes = document.getElementById('notes').value.trim();

    const lines = [];
    if (start && end){
      lines.push(`Departure: ${fmt(start)}`);
      lines.push(`Return   : ${fmt(end)}`);
    } else {
      lines.push(`Departure: —`);
      lines.push(`Return   : —`);
    }
    if (modeLabel) lines.push(`Mode     : ${modeLabel}`);
    if (days) lines.push(`Duration : ${days} ${days === 1 ? 'day' : 'days'}`);

    if (destCountry || destCity) lines.push(`Destination: ${[destCity, destCountry].filter(Boolean).join(', ')}`);
    if (purpose) lines.push(`Purpose    : ${purpose}`);
    if (notes) lines.push(`Notes      : ${notes}`);

    // Holidays display
    if (elModeWork.checked && elExcludeHolidays.checked && HOLIDAYS.length){
      lines.push(`Holidays excluded: ${HOLIDAYS.join(', ')}`);
    }

    elPreview.textContent = lines.join('\n') || 'Select dates to generate a summary…';
  }

  function copySummary(){
    const text = elPreview.textContent.trim();
    if (!text || text === 'Select dates to generate a summary…') return;
    navigator.clipboard.writeText(text).then(()=>{
      elStatus.textContent = "Summary copied to clipboard.";
      elStatus.className = "status ok";
    }).catch(()=>{
      elStatus.textContent = "Could not copy to clipboard. Select and copy manually.";
      elStatus.className = "status err";
    });
  }

  function clearAll(){
    elDepart.value = '';
    elReturn.value = '';
    elModeCalendar.checked = true;
    elModeWork.checked = false;
    elExcludeHolidays.checked = false;
    updateHolidaysVisibility();
    elStatus.textContent = "";
    elDaysValue.textContent = '0';
    elDaysLabel.textContent = 'days';
    elBtnCopy.disabled = true;
    document.getElementById('country').value = '';
    document.getElementById('city').value = '';
    document.getElementById('purpose').value = '';
    document.getElementById('notes').value = '';
    updatePreview();
  }

  // Wire up events
  [elDepart, elReturn].forEach(el => el.addEventListener('change', compute));
  [elModeCalendar, elModeWork].forEach(el => el.addEventListener('change', () => { updateHolidaysVisibility(); compute(); }));
  elExcludeHolidays.addEventListener('change', compute);
  document.getElementById('country').addEventListener('input', () => updatePreview());
  document.getElementById('city').addEventListener('input', () => updatePreview());
  document.getElementById('purpose').addEventListener('input', () => updatePreview());
  document.getElementById('notes').addEventListener('input', () => updatePreview());
  elBtnCopy.addEventListener('click', copySummary);
  elBtnClear.addEventListener('click', clearAll);

  // Initialize
  updateHolidaysVisibility();
  updatePreview();
</script>
</body>
</html>
